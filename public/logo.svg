<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 275 250">
  <!-- ── Isometric cube (right side – the "D") ── -->
  <!-- top face -->
  <polygon fill="#000" points="200,20 255,53 200,87 145,53"/>
  <!-- right face -->
  <polygon fill="#000" points="255,53 255,162 200,196 200,87"/>
  <!-- left face -->
  <polygon fill="#000" points="145,53 200,87 200,196 145,162"/>

  <!-- cube wireframe: all 12 visible edges in white -->
  <!-- top-face edges -->
  <line x1="200" y1="20" x2="255" y2="53"  stroke="white" stroke-width="5"/>
  <line x1="200" y1="20" x2="145" y2="53"  stroke="white" stroke-width="5"/>
  <line x1="145" y1="53" x2="255" y2="53"  stroke="white" stroke-width="5"/>
  <!-- top apex → front vertex (center ridge of top face) -->
  <line x1="200" y1="20" x2="200" y2="87"  stroke="white" stroke-width="5"/>
  <!-- front-vertex diagonals to left/right top corners -->
  <line x1="200" y1="87" x2="255" y2="53"  stroke="white" stroke-width="5"/>
  <line x1="200" y1="87" x2="145" y2="53"  stroke="white" stroke-width="5"/>
  <!-- vertical pillar edges -->
  <line x1="255" y1="53"  x2="255" y2="162" stroke="white" stroke-width="5"/>
  <line x1="145" y1="53"  x2="145" y2="162" stroke="white" stroke-width="5"/>
  <!-- front-vertex → bottom apex (center ridge of visible faces) -->
  <line x1="200" y1="87"  x2="200" y2="196" stroke="white" stroke-width="5"/>
  <!-- bottom-face edges -->
  <line x1="145" y1="162" x2="255" y2="162" stroke="white" stroke-width="5"/>
  <line x1="145" y1="162" x2="200" y2="196" stroke="white" stroke-width="5"/>
  <line x1="255" y1="162" x2="200" y2="196" stroke="white" stroke-width="5"/>

  <!-- ── "3" letterform – upper arm ── -->
  <!-- thick diagonal wedge: upper-right anchored at cube TL, tip points upper-left -->
  <polygon fill="#000" points="145,53 50,27 10,66 145,100"/>

  <!-- ── "3" letterform – lower arm ── -->
  <!-- thick diagonal wedge: lower-right anchored at cube BL, tip points lower-left -->
  <polygon fill="#000" points="145,113 10,138 50,168 145,162"/>

  <!-- ── Speed / motion lines (bottom-left) ── -->
  <polygon fill="#000" points="0,152 55,132 51,148 0,170"/>
  <polygon fill="#000" points="0,173 55,154 51,170 0,191"/>
  <polygon fill="#000" points="0,194 55,175 51,191 0,212"/>
</svg>
